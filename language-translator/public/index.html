<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-Time Language Translator</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
    header { background: #111827; padding: 20px 40px; border-bottom: 2px solid #06b6d4; }
    header h1 { color: #22d3ee; font-size: 1.8rem; }
    header p { color: #94a3b8; font-size: 0.9rem; margin-top: 4px; }
    .container { max-width: 960px; margin: 40px auto; padding: 0 20px; }
    .translate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media(max-width: 640px) { .translate-grid { grid-template-columns: 1fr; } }
    .panel { background: #111827; border-radius: 12px; padding: 20px; border: 1px solid #1e3a4a; }
    .panel h3 { color: #22d3ee; margin-bottom: 12px; font-size: 1rem; }
    select { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #374151; background: #0a0e1a; color: #e2e8f0; font-size: 0.9rem; margin-bottom: 12px; }
    textarea { width: 100%; height: 180px; padding: 12px; border-radius: 8px; border: 1px solid #374151; background: #0a0e1a; color: #e2e8f0; font-size: 1rem; resize: vertical; outline: none; line-height: 1.6; }
    textarea:focus { border-color: #06b6d4; }
    textarea[readonly] { color: #67e8f9; background: #071520; cursor: default; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
    button { padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s; }
    .btn-primary { background: #0891b2; color: white; }
    .btn-primary:hover { background: #0e7490; }
    .btn-secondary { background: #1e3a4a; color: #94a3b8; }
    .btn-secondary:hover { background: #164e63; color: white; }
    .btn-clear { background: #1f2937; color: #94a3b8; }
    .status { font-size: 0.85rem; color: #94a3b8; padding: 6px 12px; background: #111827; border-radius: 20px; }
    .status.active { color: #34d399; background: #064e3b; }
    .history-card { background: #111827; border-radius: 12px; padding: 20px; border: 1px solid #1e3a4a; }
    .history-card h3 { color: #22d3ee; margin-bottom: 14px; }
    .history-item { padding: 12px; border-radius: 8px; background: #0a0e1a; margin-bottom: 10px; border-left: 3px solid #06b6d4; }
    .history-item .orig { color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; }
    .history-item .trans { color: #67e8f9; font-size: 1rem; }
    .history-item .meta { color: #4b5563; font-size: 0.75rem; margin-top: 4px; }
    .empty { color: #4b5563; font-size: 0.9rem; text-align: center; padding: 20px; }
    .char-count { font-size: 0.8rem; color: #4b5563; text-align: right; margin-top: 4px; }
    .realtime-badge { display: inline-block; width: 8px; height: 8px; background: #34d399; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .loading { color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>🌐 Real-Time Language Translator</h1>
    <p>Instant translation powered by Google Translate — type and translate live</p>
  </header>

  <div class="container">
    <div class="controls">
      <div class="status active" id="statusBadge">🟢 Ready</div>
      <div style="margin-left:auto; color:#94a3b8; font-size:0.85rem;">
        <span class="realtime-badge"></span>Real-time mode active
      </div>
    </div>

    <div class="translate-grid">
      <!-- Source -->
      <div class="panel">
        <h3>Source</h3>
        <select id="sourceLang">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="ru">Russian</option>
          <option value="ko">Korean</option>
        </select>
        <textarea id="sourceText" placeholder="Type text to translate..."></textarea>
        <div class="char-count"><span id="charCount">0</span> characters</div>
      </div>

      <!-- Target -->
      <div class="panel">
        <h3>Translation</h3>
        <select id="targetLang">
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="ru">Russian</option>
          <option value="ko">Korean</option>
          <option value="en">English</option>
        </select>
        <textarea id="translatedText" readonly placeholder="Translation will appear here..."></textarea>
        <div class="char-count" id="langLabel"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-primary" onclick="translateNow()">🔄 Translate</button>
      <button class="btn-secondary" onclick="swapLanguages()">⇄ Swap</button>
      <button class="btn-clear" onclick="clearAll()">✕ Clear</button>
      <button class="btn-secondary" onclick="copyTranslation()">📋 Copy</button>
    </div>

    <!-- History -->
    <div class="history-card">
      <h3>📜 Translation History</h3>
      <div id="historyContainer"><div class="empty">No translations yet</div></div>
      <button class="btn-clear" onclick="clearHistory()" style="margin-top:12px;">Clear History</button>
    </div>
  </div>

  <script>
    // Translation done directly from browser using Google Translate API
    // This avoids server-side IP blocks on free hosting
    const LANG_NAMES = {
      en:'English', es:'Spanish', fr:'French', de:'German', it:'Italian',
      pt:'Portuguese', ja:'Japanese', zh:'Chinese', ar:'Arabic',
      hi:'Hindi', ru:'Russian', ko:'Korean'
    };

    let translationHistory = [];
    let typingTimer;

    // Core translate function — calls Google Translate from the browser
    async function googleTranslate(text, targetLang, sourceLang = 'en') {
      if (targetLang === sourceLang) return text;
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        return data[0].map(item => item[0]).filter(Boolean).join('');
      } catch (e) {
        return null;
      }
    }

    // Real-time translate on typing (debounced 600ms)
    document.getElementById('sourceText').addEventListener('input', function () {
      document.getElementById('charCount').textContent = this.value.length;
      clearTimeout(typingTimer);
      if (this.value.trim()) {
        typingTimer = setTimeout(() => translateNow(), 600);
      } else {
        document.getElementById('translatedText').value = '';
        document.getElementById('langLabel').textContent = '';
      }
    });

    async function translateNow() {
      const text = document.getElementById('sourceText').value.trim();
      const targetLang = document.getElementById('targetLang').value;
      const sourceLang = document.getElementById('sourceLang').value;
      if (!text) return;

      document.getElementById('translatedText').value = '⏳ Translating...';
      document.getElementById('statusBadge').textContent = '🔄 Translating...';

      const translated = await googleTranslate(text, targetLang, sourceLang);

      if (translated) {
        document.getElementById('translatedText').value = translated;
        document.getElementById('langLabel').textContent = `Translated to: ${LANG_NAMES[targetLang]}`;
        document.getElementById('statusBadge').textContent = '🟢 Ready';
        document.getElementById('statusBadge').classList.add('active');

        // Add to history
        translationHistory.unshift({
          original: text, translated,
          sourceLang, language: LANG_NAMES[targetLang],
          timestamp: new Date().toISOString()
        });
        if (translationHistory.length > 20) translationHistory.pop();
        renderHistory();
      } else {
        document.getElementById('translatedText').value = '❌ Translation failed. Please try again.';
        document.getElementById('statusBadge').textContent = '🔴 Error';
      }
    }

    function swapLanguages() {
      const srcSel = document.getElementById('sourceLang');
      const tgtSel = document.getElementById('targetLang');
      const translated = document.getElementById('translatedText').value;
      const srcVal = srcSel.value;
      srcSel.value = tgtSel.value;
      tgtSel.value = srcVal;
      document.getElementById('sourceText').value = translated;
      document.getElementById('translatedText').value = '';
      document.getElementById('charCount').textContent = translated.length;
      if (translated.trim()) translateNow();
    }

    function clearAll() {
      document.getElementById('sourceText').value = '';
      document.getElementById('translatedText').value = '';
      document.getElementById('charCount').textContent = '0';
      document.getElementById('langLabel').textContent = '';
    }

    function copyTranslation() {
      const text = document.getElementById('translatedText').value;
      if (text && !text.startsWith('⏳') && !text.startsWith('❌')) {
        navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
      }
    }

    function renderHistory() {
      const container = document.getElementById('historyContainer');
      if (translationHistory.length === 0) {
        container.innerHTML = '<div class="empty">No translations yet</div>';
        return;
      }
      container.innerHTML = translationHistory.map(h => `
        <div class="history-item">
          <div class="orig">📝 ${h.original}</div>
          <div class="trans">💬 ${h.translated}</div>
          <div class="meta">${LANG_NAMES[h.sourceLang] || h.sourceLang} → ${h.language} · ${new Date(h.timestamp).toLocaleTimeString()}</div>
        </div>`).join('');
    }

    function clearHistory() {
      translationHistory = [];
      renderHistory();
    }
  </script>
</body>
</html>
