<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Event Platform</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh}
    header{background:#161b22;padding:18px 40px;border-bottom:2px solid #7c3aed;display:flex;align-items:center;justify-content:space-between}
    header h1{color:#a78bfa;font-size:1.6rem}
    header p{color:#94a3b8;font-size:0.85rem;margin-top:3px}
    .user-bar{display:flex;align-items:center;gap:10px}
    .user-bar input{padding:7px 12px;border-radius:8px;border:1px solid #374151;background:#0d1117;color:#e2e8f0;font-size:0.9rem;width:160px}
    .container{max-width:1100px;margin:30px auto;padding:0 20px}
    /* Views */
    .view{display:none} .view.active{display:block}
    /* Event list */
    .filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .filters select,.filters input{padding:8px 12px;border-radius:8px;border:1px solid #374151;background:#161b22;color:#e2e8f0;font-size:0.9rem}
    .events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .event-card{background:#161b22;border-radius:12px;padding:20px;border:1px solid #21262d;cursor:pointer;transition:border-color .2s,transform .2s}
    .event-card:hover{border-color:#7c3aed;transform:translateY(-2px)}
    .event-card .cat-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.75rem;background:#1e1b4b;color:#a78bfa;margin-bottom:10px}
    .event-card h3{font-size:1.05rem;margin-bottom:6px}
    .event-card .host{color:#94a3b8;font-size:0.85rem;margin-bottom:8px}
    .event-card .date{color:#f59e0b;font-size:0.85rem;margin-bottom:10px}
    .event-card .desc{color:#9ca3af;font-size:0.85rem;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .event-card .footer{display:flex;justify-content:space-between;align-items:center}
    .status-badge{padding:2px 10px;border-radius:20px;font-size:0.75rem}
    .status-live{background:#064e3b;color:#34d399}
    .status-upcoming{background:#1e3a5f;color:#60a5fa}
    .attendee-count{color:#94a3b8;font-size:0.8rem}
    /* Event detail */
    .back-btn{color:#a78bfa;cursor:pointer;font-size:0.9rem;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px}
    .back-btn:hover{color:#c4b5fd}
    .detail-layout{display:grid;grid-template-columns:1fr 360px;gap:24px}
    @media(max-width:768px){.detail-layout{grid-template-columns:1fr}}
    .detail-main{background:#161b22;border-radius:12px;padding:24px;border:1px solid #21262d}
    .detail-main h2{font-size:1.4rem;margin-bottom:8px}
    .detail-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
    .detail-meta span{color:#94a3b8;font-size:0.85rem}
    .detail-meta span strong{color:#e2e8f0}
    .detail-desc{color:#9ca3af;line-height:1.7;margin-bottom:20px}
    .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .tag{padding:2px 10px;border-radius:20px;font-size:0.78rem;background:#1f2937;color:#9ca3af}
    .reg-btn{padding:11px 28px;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem;font-weight:600;transition:background .2s}
    .reg-btn.register{background:#7c3aed;color:white} .reg-btn.register:hover{background:#6d28d9}
    .reg-btn.unregister{background:#374151;color:#9ca3af} .reg-btn.unregister:hover{background:#4b5563;color:white}
    /* Chat */
    .chat-panel{background:#161b22;border-radius:12px;padding:20px;border:1px solid #21262d;display:flex;flex-direction:column;height:520px}
    .chat-panel h3{color:#a78bfa;margin-bottom:10px;font-size:1rem}
    .presence{font-size:0.8rem;color:#34d399;margin-bottom:10px}
    .chat-messages{flex:1;overflow-y:auto;margin-bottom:12px;padding-right:4px}
    .chat-msg{margin-bottom:10px}
    .chat-msg .sender{font-size:0.78rem;color:#a78bfa;margin-bottom:2px}
    .chat-msg .text{background:#0d1117;padding:8px 12px;border-radius:8px;font-size:0.9rem;line-height:1.5}
    .chat-msg.system .text{background:transparent;color:#4b5563;font-style:italic;font-size:0.82rem}
    .chat-msg .time{font-size:0.72rem;color:#4b5563;margin-top:2px}
    .chat-input-row{display:flex;gap:8px}
    .chat-input-row input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid #374151;background:#0d1117;color:#e2e8f0;font-size:0.9rem}
    .chat-input-row input:focus{outline:none;border-color:#7c3aed}
    .chat-input-row button{padding:9px 14px;background:#7c3aed;border:none;border-radius:8px;color:white;cursor:pointer}
    .reactions{display:flex;gap:6px;margin-bottom:8px}
    .react-btn{padding:5px 10px;background:#1f2937;border:none;border-radius:20px;cursor:pointer;font-size:1rem;transition:background .2s}
    .react-btn:hover{background:#374151}
    /* Create event modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
    .modal-bg.open{display:flex}
    .modal{background:#161b22;border-radius:16px;padding:28px;width:100%;max-width:520px;border:1px solid #374151}
    .modal h2{color:#a78bfa;margin-bottom:20px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:0.85rem;color:#94a3b8;margin-bottom:5px}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #374151;background:#0d1117;color:#e2e8f0;font-size:0.9rem}
    .form-group textarea{height:80px;resize:vertical}
    .modal-actions{display:flex;gap:10px;margin-top:20px}
    button.btn-primary{background:#7c3aed;color:white;padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem}
    button.btn-primary:hover{background:#6d28d9}
    button.btn-ghost{background:#1f2937;color:#94a3b8;padding:10px 22px;border:none;border-radius:8px;cursor:pointer}
    .toast{position:fixed;bottom:24px;right:24px;background:#7c3aed;color:white;padding:12px 20px;border-radius:10px;font-size:0.9rem;display:none;z-index:200}
  </style>
</head>
<body>
<header>
  <div>
    <h1>🎪 Virtual Event Platform</h1>
    <p>Discover, join, and host virtual events in real-time</p>
  </div>
  <div class="user-bar">
    <input type="text" id="userName" placeholder="Your name..." value="Guest" />
    <button class="btn-primary" onclick="openCreateModal()">+ Create Event</button>
  </div>
</header>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Create Modal -->
<div class="modal-bg" id="createModal">
  <div class="modal">
    <h2>🆕 Create New Event</h2>
    <div class="form-group"><label>Event Title *</label><input id="newTitle" placeholder="e.g. React Conf 2026" /></div>
    <div class="form-group"><label>Description</label><textarea id="newDesc" placeholder="What's this event about?"></textarea></div>
    <div class="form-group"><label>Host Name *</label><input id="newHost" placeholder="Your name" /></div>
    <div class="form-group"><label>Date & Time *</label><input type="datetime-local" id="newDate" /></div>
    <div class="form-group"><label>Category</label>
      <select id="newCategory"><option>Technology</option><option>Business</option><option>Design</option><option>Education</option><option>Health</option><option>General</option></select>
    </div>
    <div class="form-group"><label>Capacity</label><input type="number" id="newCapacity" value="100" min="1" /></div>
    <div class="form-group"><label>Tags (comma separated)</label><input id="newTags" placeholder="e.g. react, frontend, ui" /></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="createEvent()">Create Event</button>
      <button class="btn-ghost" onclick="closeCreateModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="container">
  <!-- Events List View -->
  <div id="listView" class="view active">
    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 Search events..." oninput="filterEvents()" style="width:220px"/>
      <select id="categoryFilter" onchange="filterEvents()">
        <option value="">All Categories</option>
        <option>Technology</option><option>Business</option><option>Design</option>
        <option>Education</option><option>Health</option><option>General</option>
      </select>
      <select id="statusFilter" onchange="filterEvents()">
        <option value="">All Status</option>
        <option value="live">🔴 Live</option>
        <option value="upcoming">📅 Upcoming</option>
      </select>
    </div>
    <div class="events-grid" id="eventsGrid"></div>
  </div>

  <!-- Event Detail View -->
  <div id="detailView" class="view">
    <div class="back-btn" onclick="showList()">← Back to Events</div>
    <div class="detail-layout">
      <div class="detail-main" id="detailMain"></div>
      <div class="chat-panel" id="chatPanel">
        <h3>💬 Live Chat</h3>
        <div class="presence" id="presenceInfo">Join to see attendees</div>
        <div class="reactions" id="reactionsBar">
          <button class="react-btn" onclick="sendReaction('👏')">👏</button>
          <button class="react-btn" onclick="sendReaction('🔥')">🔥</button>
          <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
          <button class="react-btn" onclick="sendReaction('🤔')">🤔</button>
          <button class="react-btn" onclick="sendReaction('✋')">✋</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()" />
          <button onclick="sendChat()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const socket = io();
  let allEvents = [];
  let currentEvent = null;
  let isRegistered = false;
  let currentUserId = 'user_' + Math.random().toString(36).substr(2, 6);

  // ── Socket listeners ──
  socket.on('chat:history', msgs => {
    const el = document.getElementById('chatMessages');
    el.innerHTML = '';
    msgs.forEach(appendChatMsg);
    el.scrollTop = el.scrollHeight;
  });

  socket.on('chat:message', msg => {
    appendChatMsg(msg);
    const el = document.getElementById('chatMessages');
    el.scrollTop = el.scrollHeight;
  });

  socket.on('chat:system', ({ message, timestamp }) => {
    appendChatMsg({ system: true, message, timestamp });
  });

  socket.on('room:presence', ({ count, users }) => {
    document.getElementById('presenceInfo').textContent = `👥 ${count} attendee${count !== 1 ? 's' : ''} online: ${users.slice(0,5).join(', ')}${users.length > 5 ? '…' : ''}`;
  });

  socket.on('event:reaction', ({ name, reaction }) => {
    showToast(`${name} reacted ${reaction}`);
  });

  socket.on('event:created', (event) => {
    allEvents.unshift(event);
    renderEvents(allEvents);
  });

  socket.on('event:attendee_joined', ({ count }) => {
    const el = document.querySelector('#detailMain .attendee-count-val');
    if (el) el.textContent = count;
  });

  // ── Load events ──
  async function loadEvents() {
    const res = await fetch('/api/events');
    const data = await res.json();
    allEvents = data.events;
    renderEvents(allEvents);
  }

  function renderEvents(events) {
    const grid = document.getElementById('eventsGrid');
    if (events.length === 0) {
      grid.innerHTML = '<p style="color:#4b5563;grid-column:1/-1;text-align:center;padding:40px">No events found.</p>';
      return;
    }
    grid.innerHTML = events.map(e => `
      <div class="event-card" onclick="showDetail('${e.id}')">
        <div class="cat-badge">${e.category}</div>
        <h3>${e.title}</h3>
        <div class="host">👤 ${e.host}</div>
        <div class="date">📅 ${new Date(e.date).toLocaleString()}</div>
        <div class="desc">${e.description}</div>
        <div class="footer">
          <span class="status-badge status-${e.status}">${e.status === 'live' ? '🔴 LIVE' : '📅 Upcoming'}</span>
          <span class="attendee-count">👥 ${e.attendees.length}/${e.capacity}</span>
        </div>
      </div>`).join('');
  }

  function filterEvents() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('categoryFilter').value;
    const status = document.getElementById('statusFilter').value;
    const filtered = allEvents.filter(e => {
      const matchSearch = e.title.toLowerCase().includes(search) || e.description.toLowerCase().includes(search);
      const matchCat = !cat || e.category === cat;
      const matchStatus = !status || e.status === status;
      return matchSearch && matchCat && matchStatus;
    });
    renderEvents(filtered);
  }

  async function showDetail(eventId) {
    const res = await fetch(`/api/events/${eventId}`);
    const data = await res.json();
    currentEvent = data.event;
    isRegistered = currentEvent.attendees.includes(currentUserId);

    document.getElementById('detailMain').innerHTML = `
      <div class="cat-badge">${currentEvent.category}</div>
      <span class="status-badge status-${currentEvent.status}" style="margin-left:8px">${currentEvent.status === 'live' ? '🔴 LIVE' : '📅 Upcoming'}</span>
      <h2 style="margin-top:14px">${currentEvent.title}</h2>
      <div class="detail-meta">
        <span>👤 Host: <strong>${currentEvent.host}</strong></span>
        <span>📅 <strong>${new Date(currentEvent.date).toLocaleString()}</strong></span>
        <span>👥 <strong><span class="attendee-count-val">${currentEvent.attendees.length}</span>/${currentEvent.capacity}</strong> registered</span>
      </div>
      <div class="detail-desc">${currentEvent.description}</div>
      <div class="tags">${currentEvent.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
      <button class="reg-btn ${isRegistered ? 'unregister' : 'register'}" id="regBtn" onclick="toggleRegister()">
        ${isRegistered ? '✓ Registered — Cancel' : '🎟️ Register for Event'}
      </button>`;

    document.getElementById('listView').classList.remove('active');
    document.getElementById('detailView').classList.add('active');
    document.getElementById('chatMessages').innerHTML = '';

    // Join socket room
    const name = document.getElementById('userName').value || 'Guest';
    socket.emit('room:join', { eventId: currentEvent.id, userId: currentUserId, name });
  }

  function showList() {
    if (currentEvent) {
      const name = document.getElementById('userName').value || 'Guest';
      socket.emit('room:leave', { eventId: currentEvent.id, name });
    }
    document.getElementById('detailView').classList.remove('active');
    document.getElementById('listView').classList.add('active');
    currentEvent = null;
  }

  async function toggleRegister() {
    if (!currentEvent) return;
    if (isRegistered) {
      await fetch(`/api/events/${currentEvent.id}/register/${currentUserId}`, { method: 'DELETE' });
      isRegistered = false;
    } else {
      const res = await fetch(`/api/events/${currentEvent.id}/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUserId }),
      });
      const data = await res.json();
      if (data.error) return showToast(data.error);
      isRegistered = true;
    }
    const btn = document.getElementById('regBtn');
    btn.className = `reg-btn ${isRegistered ? 'unregister' : 'register'}`;
    btn.textContent = isRegistered ? '✓ Registered — Cancel' : '🎟️ Register for Event';
    showToast(isRegistered ? 'Successfully registered!' : 'Registration cancelled.');
  }

  function sendChat() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message || !currentEvent) return;
    const name = document.getElementById('userName').value || 'Guest';
    socket.emit('chat:message', { eventId: currentEvent.id, userId: currentUserId, name, message });
    input.value = '';
  }

  function sendReaction(reaction) {
    if (!currentEvent) return;
    const name = document.getElementById('userName').value || 'Guest';
    socket.emit('event:reaction', { eventId: currentEvent.id, name, reaction });
  }

  function appendChatMsg(msg) {
    const el = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `chat-msg${msg.system ? ' system' : ''}`;
    if (msg.system) {
      div.innerHTML = `<div class="text">${msg.message}</div>`;
    } else {
      div.innerHTML = `<div class="sender">${msg.name}</div><div class="text">${msg.message}</div><div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
    }
    el.appendChild(div);
  }

  // Create event
  function openCreateModal() { document.getElementById('createModal').classList.add('open'); }
  function closeCreateModal() { document.getElementById('createModal').classList.remove('open'); }

  async function createEvent() {
    const title = document.getElementById('newTitle').value.trim();
    const host = document.getElementById('newHost').value.trim();
    const date = document.getElementById('newDate').value;
    if (!title || !host || !date) return showToast('Title, host, and date are required.');

    const res = await fetch('/api/events', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title, host, date: new Date(date).toISOString(),
        description: document.getElementById('newDesc').value,
        category: document.getElementById('newCategory').value,
        capacity: parseInt(document.getElementById('newCapacity').value) || 100,
        tags: document.getElementById('newTags').value.split(',').map(t => t.trim()).filter(Boolean),
      }),
    });
    const data = await res.json();
    if (data.event) { showToast('Event created!'); closeCreateModal(); }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  loadEvents();
</script>
</body>
</html>
